<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Boostrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    .nav-link {
      color: #8e8e8e;
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: #262626;
    }

    .nav-link.active {
      color: #000;
    }

    .nav-link.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 2px;
      background-color: #000;
      border-radius: 2px;
    }
  </style>
  <body>
    <!-- nav start -->
    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid">
        <a href="#" class="navbar-brand d-flex align-items-center">
          <i class="fa-brands fa-instagram fa-xl"></i>
          <span class="ms-1 fw-semibold">Instagram</span>
        </a>

        <div class="d-flex align-items-center ms-auto gap-2">
          <button
            type="button"
            class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#create-post-dialog"
          >
            Create a new post
          </button>
          <!-- dropdown start -->
          <div class="dropdown">
            <button
              type="button"
              class="btn btn-secondary dropdown-toggle"
              data-bs-toggle="dropdown"
            >
              <i class="fa-solid fa-gear"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <a href="#" class="dropdown-item">Profile</a>
              <a href="#" class="dropdown-item">Accesibility</a>
              <a href="#" class="dropdown-item">Privacy and Data</a>
              <hr class="dropdown-divider" />
              <a href="#" class="dropdown-item text-danger">Log out</a>
            </ul>
          </div>
          <!-- dropdown-end -->
        </div>
      </div>
    </nav>
    <!-- nav end -->

    <!-- dialog start -->
    <div class="modal fade" id="create-post-dialog" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form action="#">
            <div class="modal-header">
              <h1 class="modal-title fs-5 fw-semibold">Create a new post</h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body">
              <label for="post-caption" class="form-label">Caption:</label>
              <textarea
                name=""
                id="post-caption"
                class="form-control"
                placeholder="Add the caption of your post here"
                rows="3"
              ></textarea>
              <div class="d-flex gap-2 mt-3">
                <button
                  class="btn btn-light border d-flex align-items-center justify-content-center p-0 rounded-3"
                  style="width: 2rem; aspect-ratio: 1 / 1"
                >
                  <i class="fa-solid fa-camera"></i>
                </button>
                <button
                  class="btn btn-light border d-flex align-items-center justify-content-center p-0 rounded-3"
                  style="width: 2rem; aspect-ratio: 1 / 1"
                >
                  <i class="fa-solid fa-location-dot"></i>
                </button>
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button type="submit" class="btn btn-success">Publish</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- dialog end -->

    <ul
      class="nav mb-3 justify-content-center align-items-center"
      id="myTab"
      role="tablist"
    >
      <li class="nav-item" role="presentation">
        <button
          class="nav-link active"
          id="home-tab"
          data-bs-toggle="tab"
          data-bs-target="#home"
          type="button"
          role="tab"
          aria-controls="home"
          aria-selected="true"
        >
          <i class="fa-solid fa-grip"></i>
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="profile-tab"
          data-bs-toggle="tab"
          data-bs-target="#profile"
          type="button"
          role="tab"
          aria-controls="profile"
          aria-selected="false"
        >
          <i class="fa-solid fa-square"></i>
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <div
        class="tab-pane fade show active"
        id="home"
        role="tabpanel"
        aria-labelledby="home-tab"
      >
        ...
      </div>

      <div
        class="tab-pane fade"
        id="profile"
        role="tabpanel"
        aria-labelledby="profile-tab"
      >
        ...
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/072e5df971.js"
      crossorigin="anonymous"
    ></script>
    <!-- <script>
      document.addEventListener("DOMContentLoaded", function () {
        const modal = new bootstrap.Modal(
          document.getElementById("create-post-dialog"),
        );
        modal.show();
      });
    </script> -->
  </body>
</html>
